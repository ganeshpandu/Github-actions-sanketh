name: Frontend CI Pipeline

on:
  push:
    branches:
      - main

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install
        working-directory: frontend-app

      - name: Build application
        run: npm run build
        working-directory: frontend-app

  test:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: npm test
        working-directory: frontend-app

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Deploy step
        run: echo "Deploying frontend application 🚀"
