name: Scheduled Job Demo

on:
  schedule:
    - cron: '*/5 * * * *'   # Runs every 5 minutes

jobs:
  scheduled-task:
    runs-on: ubuntu-latest

    steps:
      - name: Print time
        run: echo "Scheduled workflow executed at $(date)"

      - name: Demo task
        run: echo "Running automated scheduled task..."
